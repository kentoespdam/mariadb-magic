# MariaDB Test Fixtures for MagicSync
# Usage: docker compose -f tests/fixtures/docker-compose.yml [up|down]

services:
  magicsync-src:
    image: mariadb:11.2
    container_name: magicsync-src
    hostname: magicsync-src
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: magicsync
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    volumes:
      - ./src-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 5s
    networks:
      - magicsync-net

  magicsync-dst:
    image: mariadb:11.2
    container_name: magicsync-dst
    hostname: magicsync-dst
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: magicsync
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    volumes:
      - ./dst-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 5s
    networks:
      - magicsync-net

networks:
  magicsync-net:
    name: magicsync-test
    driver: bridge