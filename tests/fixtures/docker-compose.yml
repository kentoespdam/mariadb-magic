version: '3.8'

services:
  magicsync-src:
    image: mariadb:11.2
    container_name: magicsync-src
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: magicsync
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    volumes:
      - ./src-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  magicsync-dst:
    image: mariadb:11.2
    container_name: magicsync-dst
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: magicsync
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    volumes:
      - ./dst-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

networks:
  default:
    name: magicsync-test